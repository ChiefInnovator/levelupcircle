<!DOCTYPE html>
<html lang="en">
<head>

    <style>

        body {

            border-bottom: 1px solid #333;
            padding: 12px 20px;
            height: 56px;
        }

        .site-header h1 {
            font-size: 20px;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            white-space: nowrap;
        }

        .site-header h1 a {
            color: inherit;
            text-decoration: none;
        }

        .site-header h1 a:hover {
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
        }

        .site-header .site-nav {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 16px;
        }

        .site-header .site-nav a {
            color: #ccc;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: color 0.15s ease, text-shadow 0.15s ease;
        }

        .site-header .site-nav a:hover,
        .site-header .site-nav a.active {
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
        }

        .content {
            max-width: 760px;
            margin: 0 auto;
            padding: 48px 24px 100px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #888;

        .loading {

        }

        .error {

            padding: 80px 0;

            font-size: 16px;

        /* Markdown article styles */
        .article h1 {
            font-size: 36px;
            color: #fff;
            margin-bottom: 24px;

        }

        .article h2 {
            font-size: 26px;

            margin-top: 48px;

            padding-bottom: 8px;

        }

        .article h3 {
            font-size: 20px;
            color: #eee;
            margin-top: 36px;
            margin-bottom: 12px;
        }

        .article p {
            font-size: 17px;
            line-height: 1.8;
            margin-bottom: 18px;
            color: #ccc;
        }

        .article strong {
            color: #fff;
            font-weight: 600;
        }

        .article em {
            color: #bbb;
        }

        .article a {
            color: #6bcb77;
            text-decoration: none;
            border-bottom: 1px solid rgba(107, 203, 119, 0.3);
            transition: color 0.15s ease, border-color 0.15s ease;
        }

        .article a:hover {
            color: #8fe09a;
            border-color: #6bcb77;
        }

        .article ul, .article ol {
            margin: 16px 0 18px 24px;
            font-size: 17px;
            line-height: 1.8;
            color: #ccc;
        }

        .article li {
            margin-bottom: 8px;
        }

        .article blockquote {
            border-left: 3px solid #4d96ff;
            padding: 14px 22px;
            margin: 24px 0;
            color: #bbb;
            font-style: italic;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 0 8px 8px 0;
        }

        .article blockquote p {
            margin-bottom: 0;
        }

        .article hr {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            margin: 48px 0;
        }

        .article img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin: 24px 0;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .article code {
            font-family: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, Consolas, monospace;
            background: rgba(255, 255, 255, 0.06);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
            color: #e0e0e0;
        }

        .article pre {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            padding: 20px;
            margin: 24px 0;
            overflow-x: auto;
        }

        .article pre code {
            background: none;
            padding: 0;
            font-size: 14px;
            line-height: 1.6;
        }

        .article-footer {
            margin-top: 56px;
            padding-top: 32px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
        }

        .article-footer a {
            display: inline-block;
            padding: 12px 32px;
            background: #fff;
            color: #000;
            text-decoration: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .article-footer a:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 255, 255, 0.1);
        }

        .article-footer p {
            margin-top: 12px;
            font-size: 13px;
            color: #555;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <nav class="site-nav">
            <a href="articles.html" class="active">Articles</a>
            <a href="about.html">About</a>
        </nav>
        <h1><a href="levelup-circle-generator.html">🎯 Level-Up Circle Generator</a></h1>
    </header>

    <main class="content">
        <a href="articles.html" class="back-link">&larr; All Articles</a>
        <div id="article" class="article">
            <div class="loading">Loading article...</div>
        </div>
        <div class="article-footer" id="articleFooter" style="display: none;">
            <a href="levelup-circle-generator.html">Build Your Level-Up Circle</a>
            <p>Free. No sign-up. Works in any browser.</p>
        </div>
    </main>

    <script>
        // Allowed articles (whitelist to prevent arbitrary file loading)
        const allowedPosts = {
            'level_up_circle_blog': 'level_up_circle_blog.md',
            'level_up_circle_blog_v2': 'level_up_circle_blog_v2.md'
        };

        async function loadArticle() {
            const params = new URLSearchParams(window.location.search);
            const postId = params.get('post');
            const articleEl = document.getElementById('article');
            const footerEl = document.getElementById('articleFooter');

            if (!postId || !allowedPosts[postId]) {
                articleEl.innerHTML = '<div class="error">Article not found. <a href="articles.html">Back to articles</a></div>';
                return;
            }

            try {
                const response = await fetch(allowedPosts[postId]);
                if (!response.ok) throw new Error('Failed to load');

                const markdown = await response.text();

                // Configure marked
                marked.setOptions({
                    breaks: true,
                    gfm: true
                });

                articleEl.innerHTML = marked.parse(markdown);
                footerEl.style.display = '';

                // Update page title from first h1
                const firstH1 = articleEl.querySelector('h1');
                if (firstH1) {
                    document.title = firstH1.textContent + ' — Level-Up Circle Generator';
                }
            } catch (e) {
                articleEl.innerHTML = '<div class="error">Failed to load article. <a href="articles.html">Back to articles</a></div>';
            }
        }

        loadArticle();
    </script>
</body>
</html>
